name: Build image, push to ECR, deploy ECS Infrastructure

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  AWS_REGION: eu-central-1
  TF_VERSION: 1.5.0

jobs:
  terraform:
    name: Terraform + Docker
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Autentizace přes GitHub OIDC - žádné dlouhodobé AWS klíče v secrets.
      # AWS_ROLE_ARN je output "github_actions_role_arn" z terraformu, nastavený
      # jako repository variable (Settings -> Secrets and variables -> Actions -> Variables).
      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Format Check
        id: fmt
        run: terraform fmt -check
        continue-on-error: true

      - name: Terraform Init
        id: init
        run: terraform init -input=false

      - name: Terraform Validate
        id: validate
        run: terraform validate -no-color

      - name: Terraform Plan
        id: plan
        if: github.event_name == 'pull_request'
        run: terraform plan -no-color -input=false
        continue-on-error: true

      - name: Post Plan to PR
        uses: actions/github-script@v7
        if: github.event_name == 'pull_request'
        env:
          PLAN: "terraform\n${{ steps.plan.outputs.stdout }}"
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const output = `#### Terraform Format 🖌 \`${{ steps.fmt.outcome }}\`
            #### Terraform Init ⚙️ \`${{ steps.init.outcome }}\`
            #### Terraform Validate 🤖 \`${{ steps.validate.outcome }}\`
            #### Terraform Plan 📖 \`${{ steps.plan.outcome }}\`

            <details><summary>Show Plan</summary>

            \`\`\`
            ${process.env.PLAN}
            \`\`\`

            </details>

            *Pushed by: @${{ github.actor }}, Action: \`${{ github.event_name }}\`*`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            })

      - name: Terraform Plan Status
        if: steps.plan.outcome == 'failure'
        run: exit 1

      # Krok 1 (bonus - infrastruktura): vytvoříme jen ECR registry pomocí -target,
      # aby existoval dřív, než do něj budeme pushovat image.
      - name: Terraform Apply - ECR only (-target)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: terraform apply -auto-approve -input=false -target=aws_ecr_repository.app

      - name: Get ECR repository URL
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        id: ecr
        run: |
          REPO_URL=$(terraform output -raw ecr_repository_url)
          echo "repo_url=$REPO_URL" >> $GITHUB_OUTPUT

      # Krok 2 (základní úkol): build docker image z nginx a publikace do ECR.
      - name: Build and push Docker image to ECR
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          REPO_URL="${{ steps.ecr.outputs.repo_url }}"
          aws ecr get-login-password --region ${{ env.AWS_REGION }} \
            | docker login --username AWS --password-stdin "$REPO_URL"

          docker build -t "$REPO_URL:${{ github.sha }}" -t "$REPO_URL:latest" .
          docker push "$REPO_URL:${{ github.sha }}"
          docker push "$REPO_URL:latest"

      # Krok 3 (bonus - infrastruktura): plný apply dotvoří ALB, ECS cluster,
      # task definition a service. Task definition ukazuje na image, který jsme
      # právě pushli (tag = commit SHA), ne na public docker hub.
      - name: Terraform Apply - full infrastructure
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: terraform apply -auto-approve -input=false -var="image_tag=${{ github.sha }}"

      - name: Get Load Balancer URL
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        id: lb_url
        run: |
          LB_URL=$(terraform output -raw load_balancer_url)
          echo "url=$LB_URL" >> $GITHUB_OUTPUT
          echo "Load Balancer URL: $LB_URL"

      - name: Test Application
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          URL="${{ steps.lb_url.outputs.url }}"
          echo "Waiting for ECS service to stabilize..."
          sleep 60

          for i in {1..10}; do
            if curl -f "$URL" >/dev/null 2>&1; then
              echo "Application is responding at $URL"
              exit 0
            fi
            echo "Attempt $i failed, retrying in 30 seconds..."
            sleep 30
          done

          echo "Application did not respond within the expected time"
          exit 1
